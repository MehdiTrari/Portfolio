services:
  portfolio:
    build:
      context: .
      target: runner
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: "https://mehditrari.com"
